# ==========================================
# PayShield 10K HSM POC - Application Config
# Feature Branch: AES Key Block LMK Migration
# ==========================================

server.port=8080
spring.application.name=hsm-poc-webapp

# ==========================================
# PayShield 10K Connection Settings
# ==========================================
payshield.host=202.186.1.53

# LMK Mode: "variant" (3DES, port 1501) or "keyblock" (AES, port 1502)
# Toggle this to switch between modes:
payshield.lmk-mode=keyblock

# Dual-port configuration
payshield.port=1501
payshield.port-key-block=1502

payshield.header-length=4
payshield.connect-timeout-ms=5000
payshield.read-timeout-ms=15000
payshield.length-prefix-enabled=true

# Connection Pool
payshield.pool-max-total=3
payshield.pool-max-idle=2
payshield.pool-min-idle=1

# RSA Key Settings
payshield.default-modulus-length=2048
payshield.private-key-storage-index=000

# Crypto Defaults (SHA-256 + PKCS#1 v1.5 for PayNet RPP)
payshield.default-hash-id=06
payshield.default-sig-id=01
payshield.default-pad-mode=01

# Key Block LMK Attributes (used when lmk-mode=keyblock)
# Mode of Use: S=Sign, D=Decrypt, N=No restriction
payshield.key-block-mode-of-use=S
# Key Version Number (00-99)
payshield.key-block-key-version=00
# Exportability: N=Non-exportable, S=Exportable under KEK
payshield.key-block-exportability=N

# ==========================================
# Logging
# ==========================================
logging.level.my.com.kambiz.hsm=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n