# ==========================================
# UAT / Stage Profile — Connection Pool Stress Testing
# ==========================================
# Activate with: -Dspring.profiles.active=uat
# Or: SPRING_PROFILES_ACTIVE=uat
# ==========================================

# ==========================================
# Server — increase Tomcat thread pool to
# handle high concurrent HTTP requests
# ==========================================
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20

# ==========================================
# PayShield Connection Settings (Stage HSM)
# ==========================================
payshield.host=202.186.1.53
payshield.lmk-mode=keyblock
payshield.port=1501
payshield.port-key-block=1502
payshield.header-length=4
payshield.connect-timeout-ms=5000
payshield.read-timeout-ms=15000
payshield.length-prefix-enabled=true

# ==========================================
# Connection Pool — Stress Test Sizing
#
# Start here: pool-max-total=10
# Incrementally increase if TPS is bounded by pool wait time.
#
# Rule of thumb for RPP signing:
#   pool-max-total >= peak concurrent RPP transactions
#
# During stress test:
#   concurrency == pool-max-total  → pool fully saturated, no waiting
#   concurrency >  pool-max-total  → some threads wait (test borrow-timeout)
#
# Sign  = 1 HSM command  (EW)
# Verify = 2 HSM commands (EO + EY), but sequential → still 1 connection at a time
# ==========================================
payshield.pool-max-total=10
payshield.pool-max-idle=8
payshield.pool-min-idle=3

# How long (ms) a thread waits for a connection before throwing a pool-exhausted error.
# Lower value = fail fast; higher value = allow more queue depth under burst.
payshield.pool-borrow-timeout-ms=8000

# ==========================================
# RSA / Crypto Defaults
# ==========================================
payshield.default-modulus-length=2048
payshield.private-key-storage-index=000
payshield.default-hash-id=06
payshield.default-sig-id=01
payshield.default-pad-mode=01

# Key Block LMK Attributes
payshield.key-block-mode-of-use=S
payshield.key-block-key-version=00
payshield.key-block-exportability=N

# ==========================================
# Logging — INFO level under load to avoid
# disk I/O becoming a throughput bottleneck.
# Switch to DEBUG only when investigating
# a specific failure.
# ==========================================
logging.level.my.com.kambiz.hsm=INFO
logging.level.root=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ==========================================
# Stress Test Tuning Notes
# ==========================================
# Phase 1 — Baseline (sign only, low concurrency)
#   POST /api/stress/sign-verify
#   { "concurrency": 3, "totalOperations": 50, "signOnly": true, ... }
#   → Establish single-threaded sign latency baseline
#
# Phase 2 — Saturate pool (concurrency == pool-max-total)
#   { "concurrency": 10, "totalOperations": 500, "signOnly": false, ... }
#   → All 10 connections in use; verify no waiting, all succeed
#
# Phase 3 — Exceed pool (concurrency > pool-max-total)
#   { "concurrency": 15, "totalOperations": 300, "signOnly": false, ... }
#   → 5 threads must wait; verify borrow-timeout behaviour (8s)
#   → Expected: some add latency, none should error if borrow-timeout is generous
#
# Phase 4 — External realistic load with k6
#   See load-tests/k6-sign-verify.js
#   BASE_URL=http://<stage-host>:8080 POOL_SIZE=10 k6 run load-tests/k6-sign-verify.js
